<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dev Detective</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🔍 Dev Detective</h1>

    <!-- Search -->
    <input type="text" id="searchInput" placeholder="Enter GitHub username">
    <button id="searchBtn">Search</button>

    <!-- Loading -->
    <p id="loading" class="hidden">Loading...</p>

    <!-- Error -->
    <p id="error" class="hidden">User Not Found ❌</p>

    <!-- Profile -->
    <div id="profile" class="card hidden"></div>

    <!-- Repos (Separate Section) -->
    <div id="repos" class="hidden"></div>

    <!-- Battle Mode -->
    <h2>⚔️ Battle Mode</h2>

    <input type="text" id="user1" placeholder="First username">
    <input type="text" id="user2" placeholder="Second username">
    <button id="battleBtn">Battle</button>

    <div id="battleResult"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
